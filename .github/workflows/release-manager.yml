name: Release Manager

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

concurrency:
    group: release-manager-${{ github.ref }}
    cancel-in-progress: false

jobs:
    check:
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.10'
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run test
            - run: bun run build

    release:
        needs: check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.10'
            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            - name: Read package version
              id: package
              run: |
                  echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
            - name: Skip if release tag already exists
              id: tag
              run: |
                  if git rev-parse "v${{ steps.package.outputs.version }}" >/dev/null 2>&1; then
                      echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi
            - name: Create and push release tag
              if: steps.tag.outputs.exists != 'true'
              run: |
                  git tag -a "v${{ steps.package.outputs.version }}" -m "v${{ steps.package.outputs.version }}"
                  git push origin "v${{ steps.package.outputs.version }}"

    publish:
        needs: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.10'
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.14.0'
                  registry-url: 'https://registry.npmjs.org'
            - name: Read package metadata
              id: package
              run: |
                  echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
                  echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
            - name: Verify release tag exists
              run: |
                  git fetch --tags origin
                  git rev-parse "v${{ steps.package.outputs.version }}" >/dev/null 2>&1
            - run: bun install --frozen-lockfile
            - name: Create GitHub release from changelog
              run: |
                  gh release view "v${{ steps.package.outputs.version }}" >/dev/null 2>&1 || bunx changelogen gh release "v${{ steps.package.outputs.version }}" --token "$GITHUB_TOKEN"
              env:
                  GITHUB_TOKEN: ${{ github.token }}
            - run: bun run build
            - name: Check npm package version
              id: npm
              run: |
                  if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
                      echo "published=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "published=false" >> "$GITHUB_OUTPUT"
                  fi
            - name: Publish to npm with trusted publishing
              run: npm publish --access public
              if: steps.npm.outputs.published != 'true'
