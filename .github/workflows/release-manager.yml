name: Release Manager

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

concurrency:
    group: release-manager-${{ github.ref }}
    cancel-in-progress: false

jobs:
    check:
        if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.10'
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run test
            - run: bun run build

    release:
        needs: check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.10'
            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            - run: bun install --frozen-lockfile
            - name: Create release commit and tag
              run: bun run release -- --push
            - name: Create GitHub release from changelog
              run: bunx changelogen gh release --token "$GITHUB_TOKEN"
              env:
                  GITHUB_TOKEN: ${{ github.token }}
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  registry-url: 'https://registry.npmjs.org'
            - run: bun run build
            - run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
